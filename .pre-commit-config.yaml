# .pre-commit-config.yaml
# To use this file, install pre-commit (https://pre-commit.com):
#   pip install pre-commit
# Then install the hooks in your repo:
#   pre-commit install
# To run on all files manually:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.0
    hooks:
      - id: terraform_fmt
        args:
          - --args=-recursive

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, yaml, json, markdown]

  - repo: local
    hooks:
      - id: addlicense
        name: Add License Headers
        description: Ensures all files have the Apache 2.0 license header
        # Requires `addlicense` to be installed locally (go install github.com/google/addlicense@latest)
        entry: addlicense -c "Schwarz Digits Cloud GmbH & Co. KG" -l apache
        language: system
        types_or: [terraform, python, go, javascript]
        pass_filenames: true
